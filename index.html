<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhOnExT</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>WhOnExT</h1>
        
        <!-- "Who is next?" Button and Result -->
        <div class="who-next">
            <input type="number" id="numParticipants" placeholder="Number of Participants">
            <button onclick="chooseNext()">Who is Next?</button>
            <div id="chosenNum" class="display-number">0</div>
        </div>

        <!-- Timer Controls -->
        <div class="timer-controls">
            <button id="timerButton" onclick="toggleTimer()">Start</button>
            <button onclick="resetTimer()">Reset</button>
            <div id="timeDisplay" class="display-timer">00:00</div>
        </div>
        
        <!-- Image Upload and Display -->
        <div class="image-upload">
            <input type="file" id="imageInput" accept="image/*" onchange="loadImage(event)">
            <img id="selectedImage" class="display-image" alt="Selected Image">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
